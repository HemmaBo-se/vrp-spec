name: Validate VRP Spec Artifacts

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: JSON and schema validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate artifacts
        run: npm test

      - name: Updated-stamp guard (spec content changed => landing-page stamp bumped)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=50
          node scripts/check-updated-stamp.mjs origin/${{ github.base_ref }}
